{% if notifications %}

<style>
    .actions-row {
        display: flex;
        gap: 5px;
    }

    .btn,
    .list-group-item {
        font-size: 0.9rem;
    }

    .disclaimer {
        font-size: 0.87rem;
    }
</style>

<form method="post" action="{% url 'notifications' %}" class="actions-row mb-3">
    {% csrf_token %}
    <!-- Mark all as read -->
    <button type="submit" name="mark_all" class="btn btn-primary" data-bs-toggle="modal"
        data-bs-target="#notificationsModal">
        Marcar todas como leídas
    </button>
    <!-- Delete all -->
    <button type="submit" name="delete_all" class="btn btn-warning" data-bs-toggle="modal"
        data-bs-target="#notificationsModal">
        Eliminar todas
    </button>
</form>

<ul class="list-group mb-3">
    {% for n in notifications %}
    <li class="list-group-item d-flex justify-content-between align-items-center {% if not n.read %}fw-bold{% endif %}">
        ({{ n.created_at }}) {{ n.message }}
    </li>
    {% empty %}
    <li class="list-group-item">No tienes notificaciones.</li>
    {% endfor %}
</ul>

{% endif %}

<p class="disclaimer">Todas las notificaciones serán eliminadas automáticamente despues de 2 semanas.</p>
