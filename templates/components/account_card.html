<style>
    /* TARJETA DE CUENTA */
    .account-card {
        background-color: var(--light-purple-dim);
        border-radius: 15px;
        margin: 20px 0;
    }

    .account-card.frozen {
        background-color: var(--light-blue);
    }

    .card-grid {
        display: flex;
        justify-content: space-around;
        gap: 10px;
        padding: 15px;
        padding-bottom: 5px;
    }

    .card-item {
        width: max-content;
        text-align: center;
    }

    .label {
        display: block;
        color: var(--dark-purple);
        font-weight: bold;
        font-size: 0.9rem;
        margin-bottom: 5px;
    }

    .value-box {
        border: 1.5px solid var(--dark-purple);
        border-radius: 4px;
        padding: 5px 25px;
        font-weight: bold;
        color: var(--dark-purple);
        width: 100%;
    }

    /* Banner Premium dentro de la tarjeta */
    .premium-badge {
        background-color: var(--dark-purple);
        color: var(--light-purple-dim);
        border-radius: 0 0 10px 10px;
        padding: 10px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 10px;
    }

    .premium-content {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .premium-text {
        font-weight: bold;
        letter-spacing: 1px;
    }

    .premium-date {
        font-size: 0.7rem;
        text-align: right;
        opacity: 0.9;
    }
</style>

<!-- Account card -->
<div class="account-card {% if account.is_frozen %}frozen{% endif %}">
    <div class="card-grid">
        <div class="card-item">
            <span class="label"><i class="bi bi-bank"></i> Bóveda</span>
            <div class="value-box">{{ account.pk }}</div>
        </div>

        <div class="card-item">
            <span class="label"><i class="bi bi-coin"></i> Saldo</span>
            <div class="value-box">{{ account.balance }}</div>
        </div>

        <div class="card-item">
            <span class="label">Estado de la cuenta</span>
            <div class="value-box status-text">
                {% if account.is_frozen %}Congelada{% else %}Activa{% endif %}
            </div>
        </div>
    </div>

    <!-- Premium expiration date -->
    {% if account.premium_ex_date %}
    <div class="premium-badge">
        <div class="premium-content">
            <span class="crown-icon">👑</span>
            <span class="premium-text">SERVICIO PREMIUM</span>
        </div>
        <div class="premium-date">
            Vence: <br> {{ account.premium_ex_date|date:"d/m/y" }}
        </div>
    </div>
    {% endif %}
</div>
