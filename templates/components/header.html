{% load static %}
{% block header %}

<header class="main-header">
    <style>
        .main-header {
            background-color: var(--dark-purple);
            padding: 10px 0;
            width: 100%;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px 20px;
        }

        .header-logo img {
            height: 50px;
            width: auto;
            display: block;
        }

        .header-user {
            display: flex;
            align-items: center;
        }

        .profile-icon {
            width: 1.5rem;
            transition: transform 0.2s ease;
        }

        .profile-icon:hover {
            transform: scale(1.1);
            opacity: 0.9px;
        }

        .profile-icon img {
            width: 100%;
        }

        .login-link {
            color: var(--white);
            text-decoration: none;
            font-weight: bold;
            border: 1px solid var(--white);
            padding: 5px 15px;
            border-radius: 20px;
        }

        @media (max-width: 480px) {
            .header-logo img {
                height: 35px;
            }
        }
    </style>

    <div class="header-container">
        <!-- Diagon logo -->
        <div class="header-logo">
            <a href="{% url 'home' %}">
                <img src="{% static 'imgs/Logo Callejon Diagon.png' %}" alt="Diagon Alley Logo">
            </a>
        </div>

        <!-- Profile/Login -->
        <div class="header-user">
            {% if request.user.is_authenticated %}
            <a href="{% url 'profile' %}" class="profile-icon" title="Perfil">
                <img src="{% static 'imgs/Perfil Icon.png' %}" alt="Perfil Icon">
            </a>
            {% else %}
            <a href="{% url 'login' %}" class="login-link">Iniciar sesión</a>
            {% endif %}
        </div>
    </div>
</header>

{% endblock %}
